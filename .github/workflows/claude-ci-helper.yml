name: Claude CI Failure Helper

on:
  workflow_run:
    workflows: ["Rust"]
    types: [completed]

jobs:
  diagnose:
    # Only run for same-repo PRs. Fork PRs have an empty pull_requests
    # array in workflow_run events, so this naturally excludes them.
    # Do NOT check out the PR branch — workflow_run has secrets and
    # write perms, so checking out untrusted code is an exfil vector.
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Get failure details
        id: failure_details
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_RUN_URL: ${{ github.event.workflow_run.html_url }}
        with:
          script: |
            const runId = parseInt(process.env.WORKFLOW_RUN_ID, 10);
            const runUrl = process.env.WORKFLOW_RUN_URL;

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });

            const failedJobs = jobs.data.jobs.filter(job => job.conclusion === 'failure');

            let errorLogs = [];
            for (const job of failedJobs) {
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                job_id: job.id
              });
              errorLogs.push({
                jobName: job.name,
                logs: logs.data.slice(-10000)
              });
            }

            return {
              runUrl: runUrl,
              failedJobs: failedJobs.map(j => j.name),
              errorLogs: errorLogs
            };

      - name: Diagnose failure
        uses: anthropics/claude-code-action@0d2971c794049856e777f4e8bb5a81623ec632d3 # v1.0.100
        env:
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-6 --allowedTools "Bash(gh pr comment:*)"'
          prompt: |
            The Rust CI workflow failed on PR #${{ github.event.workflow_run.pull_requests[0].number }}.

            Run URL: ${{ fromJSON(steps.failure_details.outputs.result).runUrl }}
            Failed jobs: ${{ join(fromJSON(steps.failure_details.outputs.result).failedJobs, ', ') }}

            Error logs:
            ${{ toJSON(fromJSON(steps.failure_details.outputs.result).errorLogs) }}

            Analyze the failure and post a comment on the PR with:
            1. Which job failed and on which target (x86_64 or aarch64)
            2. The root cause — is it a compile error, test failure, clippy
               lint, or infrastructure issue?
            3. A concrete suggestion for how to fix it, with code snippets
               if applicable
            4. Whether this looks like a flaky/infra failure vs a real bug

            Keep the comment concise and actionable. Do not attempt to
            build or run the code — diagnose from the logs only.

