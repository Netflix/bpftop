name: Claude Security Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

concurrency:
  group: claude-security-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run Claude Security Review
        uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6"
          prompt: '/security-review This is a Rust eBPF tool that runs as root. Focus on unsafe blocks, BPF verifier compatibility, privilege handling, and FFI memory safety at the libbpf-rs boundary.'
          allowed_bots: "dependabot[bot]"
